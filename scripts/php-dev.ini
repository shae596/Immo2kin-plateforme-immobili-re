; Limites upload pour le serveur de dev (scripts/php-dev-server.ps1 ou php -S direct).
; Ne pas utiliser avec « php artisan serve » seul : Laravel relance php -S sans ces valeurs.
; Par défaut Windows/XAMPP : upload_max_filesize = 2M — trop bas pour les photos HD.
upload_max_filesize = 12M
post_max_size = 14M
