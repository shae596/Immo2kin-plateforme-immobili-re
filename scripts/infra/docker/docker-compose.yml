# Stack de développement — Plateforme immobilière (Phase 0)
# Usage: docker compose -f infra/docker/docker-compose.yml up -d

name: immo-platform

services:
  mysql:
    image: mysql:8.4
    container_name: immo-mysql
    restart: unless-stopped
    ports:
      - '${MYSQL_PORT:-3307}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-immo_platform}
      MYSQL_USER: ${DB_USERNAME:-immo}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: immo-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend Laravel — décommenter après configuration Dockerfile Phase 1+
  # backend:
  #   build:
  #     context: ../../backend
  #     dockerfile: ../../infra/docker/Dockerfile.backend
  #   container_name: immo-backend
  #   depends_on:
  #     mysql:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   ports:
  #     - '8000:8000'
  #   env_file:
  #     - ../../backend/.env
  #   volumes:
  #     - ../../backend:/var/www/html

  ai-service:
    build:
      context: ../../ai-service
      dockerfile: Dockerfile
    container_name: immo-ai-service
    restart: unless-stopped
    ports:
      - '${AI_SERVICE_PORT:-8001}:8000'
    environment:
      APP_ENV: ${APP_ENV:-local}
      API_KEY: ${AI_SERVICE_API_KEY:-dev-ai-key}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  mysql_data:
  redis_data:
